<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Apology to Sanjuuu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Floating hearts background -->
        <div class="hearts-container">
            <div class="heart">💙</div>
            <div class="heart">💕</div>
            <div class="heart">💖</div>
            <div class="heart">💗</div>
            <div class="heart">💙</div>
            <div class="heart">💕</div>
            <div class="heart">💖</div>
            <div class="heart">💗</div>
        </div>

        <!-- Main content -->
        <div class="content">
            <h1 class="title">Sanjuuu</h1>
            
            <div class="message-box">
                <p class="message">
                    I'm truly sorry for my mistake and I hope you can forgive me.
                </p>
                <p class="message emphasis">
                    I value our friendship more than anything.
                </p>
            </div>

            <button class="forgive-btn" id="forgiveBtn">Forgive Me 💙</button>

            <div class="response-message" id="responseMessage"></div>

            <div class="hearts-end">
                <span class="heart-static">💖</span>
                <span class="heart-static">💗</span>
                <span class="heart-static">💕</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
